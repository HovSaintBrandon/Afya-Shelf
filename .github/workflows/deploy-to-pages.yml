name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Remove "latest" → let it pick the newest stable automatically
          # Or pin a recent stable version if you want consistency:
          # flutter-version: '3.29.0'   # ← uncomment if you prefer pinning

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web (Release)
        run: flutter build web --release --web-renderer html --base-href "/Afya-Shelf/"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
